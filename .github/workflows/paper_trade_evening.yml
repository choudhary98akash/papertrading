name: Paper Trader — Evening Verdict

on:
  schedule:
    - cron: '15 10 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  evening:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r paper_trader/requirements.txt
      - name: Run evening verdict
        run: python paper_trader/trader.py --mode evening
      - name: Commit results
        run: |
          git config user.name "paper-trader-bot"
          git config user.email "bot@paper-trade.local"
          git add paper_trader/ledger.json paper_trader/index.html
          git diff --cached --quiet || git commit -m "Evening verdict $(date +'%Y-%m-%d')"
          git pull --rebase --autostash
          git push
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./paper_trader
          destination_dir: paper-trading
